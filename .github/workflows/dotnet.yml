name: .NET
on:
  push:
    branches: [ "main" ]

jobs:
  
  # Handles calculating whether a new version is released
  version:
    runs-on: [ ubuntu-latest ]
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      release_notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_TEST_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Semantic Version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TEST_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/changelog
  
  
  # Builds and runs tests
  build:
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    env:
      SOLUTION_PATH: BananaGit/BananaGit.sln
      PROJECT_PATH: BananaGit/BananaGit/BananaGit.csproj
      DEPLOY_PATH: builds/BananaGit/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Only need depth 1 for build, not depth 0
          token: ${{ secrets.GIT_TEST_TOKEN }}
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal ${{ env.SOLUTION_PATH }}
        env:
          GIT_TEST_TOKEN: ${{ secrets.GIT_TEST_TOKEN }}
          GIT_TEST_USERNAME: ${{ secrets.GIT_TEST_USERNAME }}
          GIT_TEST_EMAIL: ${{ secrets.GIT_TEST_EMAIL }}

      - name: Publish application
        if: ${{ needs.build.outputs.new_release == 'true' }}
        run: |
          $version = "${{ needs.build.outputs.version }}"
          dotnet publish ${{env.PROJECT_PATH}} -c Release -r win-x64 --self-contained true -o ${{env.DEPLOY_PATH}} /p:Version=$version
      
      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: ${{ needs.build.outputs.new_release == 'true' }}
        with:
          name: BananaGit-v${{ needs.build.outputs.version }}-win-x64
          path: ${{ env.DEPLOY_PATH }}
  
  # Version -> Build/pub -> release
  
  # Releases new build
  release:
    runs-on: [ windows-latest ] # Migrate to ubuntu-latest eventually
    needs: [ version, build ] # Wait for build to succeed
    env:
      PROJECT_PATH: BananaGit/BananaGit/BananaGit.csproj
      DEPLOY_PATH: builds/BananaGit/
    steps:
      # Download uploaded artifact (GitHub will automatically zip this)
      - name: Download artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          name: BananaGit-v${{ needs.build.outputs.version }}-win-x64
          path: ${{ env.DEPLOY_PATH }}

      - name: Upload release asset
        if: ${{ needs.build.outputs.new_release == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          files: BananaGit-v${{ needs.build.outputs.version }}-win-x64.zip
          tag_name: v${{ needs.build.outputs.version }}
          body: ${{ needs.build.outputs.release_notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TEST_TOKEN }}