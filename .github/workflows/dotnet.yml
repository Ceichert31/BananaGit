name: .NET
on:
  push:
    branches: [ "main" ]

jobs:
  # Handles calculating whether a new version is released
  version:
    runs-on: [ ubuntu-latest ]
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      release_notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Semantic Version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          extra_plugins: |
            @semantic-release/git
            @semantic-release/changelog
  
  
  # Builds, runs tests, and publishes a new build if version is bumped
  build:
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    env:
      SOLUTION_PATH: BananaGit/BananaGit.sln
      PROJECT_PATH: BananaGit/BananaGit/BananaGit.csproj
      DEPLOY_PATH: builds/BananaGit/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Only need depth 1 for build, not depth 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore

      # Fix later to run test on ubuntu
      - name: Test
        run: dotnet test --no-build --verbosity normal ${{ env.SOLUTION_PATH }}
        if: matrix.os == 'windows-latest'
        env:
          GIT_TEST_TOKEN: ${{ secrets.GIT_TEST_TOKEN }}
          GIT_TEST_USERNAME: ${{ secrets.GIT_TEST_USERNAME }}
          GIT_TEST_EMAIL: ${{ secrets.GIT_TEST_EMAIL }}

      # Publish application only on window's runner
      - name: Publish application
        if: matrix.os == 'windows-latest' && needs.version.outputs.new_release == 'true'
        run: |
          $version = "${{ needs.version.outputs.version }}"
          dotnet publish ${{env.PROJECT_PATH}} -c Release -r win-x64 --self-contained true -o ${{env.DEPLOY_PATH}} /p:Version=$version
      
      # Upload artifact only if version is bumped and it's on window's action runner
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && needs.version.outputs.new_release == 'true'
        with:
          name: BananaGit-v${{ needs.version.outputs.version }}-win-x64
          path: ${{ env.DEPLOY_PATH }}
  
  # Releases new build
  release:
    runs-on: [ windows-latest ] # Migrate to ubuntu-latest eventually
    needs: [ version, build ] # Wait for build to succeed
    permissions:
      contents: write
    if: needs.version.outputs.new_release == 'true'
    env:
      PROJECT_PATH: BananaGit/BananaGit/BananaGit.csproj
      DEPLOY_PATH: builds/BananaGit/
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: BananaGit-v${{ needs.version.outputs.version }}-win-x64
          path: ${{ env.DEPLOY_PATH }}

      - name: Zip release
        run: Compress-Archive -Path ${{ env.DEPLOY_PATH }}* -DestinationPath BananaGit-v${{ needs.version.outputs.version }}-win-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: BananaGit-v${{ needs.version.outputs.version }}-win-x64.zip
          tag_name: v${{ needs.version.outputs.version }}
          body: ${{ needs.version.outputs.release_notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
